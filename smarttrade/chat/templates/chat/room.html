</div>

{% block content %}
<h2>Chat con tu asesor</h2>
<div id="chat-log" style="border:1px solid #ccc; height:300px; overflow-y:scroll; padding:10px;">
{% for msg in historial %}
    <b>{{ msg.username }}:</b> {{ msg.mensaje }} <span style="color:gray;font-size:0.8em;">{{ msg.fecha }}</span><br>
{% endfor %}
</div>
<input id="chat-message-input" type="text" size="80" placeholder="Escribe tu mensaje...">
<button id="chat-message-submit">Enviar</button>

<script>
const roomName = "{{ room_name }}";
const chatSocket = new WebSocket(
    'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
);

chatSocket.onopen = () => console.log("🔗 Conectado a " + roomName);

chatSocket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    const chatLog = document.getElementById("chat-log");
    chatLog.innerHTML += `<b>${data.username}:</b> ${data.message}<br>`;
    chatLog.scrollTop = chatLog.scrollHeight;
};

chatSocket.onclose = () => console.error("❌ WebSocket cerrado");

document.getElementById("chat-message-submit").onclick = () => {
    const input = document.getElementById("chat-message-input");
    if (input.value.trim() === "") return;
    chatSocket.send(JSON.stringify({'message': input.value}));
    input.value = '';
};
</script>
<script src="{% static 'js/script.js' %}"></script>
{% endblock %}
