{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white text-center">
            <h4>Formulario PQRS</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{% url 'pqrs:formulario_pqrs' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="text-center mt-3">
                    <button type="submit" class="btn btn-success w-100">Enviar</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <p class="text-muted">
                    Si tu solicitud es una pregunta, puedes comunicarte al correo 
                    <strong>lusa@gmail.com</strong> o al celular 
                    <strong>3165476523</strong>.
                </p>
                <a href="/" class="text-primary">← Volver al inicio</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
