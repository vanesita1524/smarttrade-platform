{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SPBVC{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">ST</a>

        <form class="d-flex mx-auto" role="search" style="width: 40%;">
            <input class="form-control me-2" type="search" placeholder="Buscar..." aria-label="Buscar">
        </form>

        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
            <li class="nav-item me-3">
                <a class="nav-link fw-semibold" href="{% url 'pqrs' %}">PQRS</a>
            </li>

            {% if user.is_authenticated %}
            <!-- Ícono de ajustes con menú -->
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="ajustesDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <!-- Ícono de ajustes -->
                    <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png" alt="Ajustes" width="28" height="28" class="me-2">
                </a>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="ajustesDropdown">
                    <li><a class="dropdown-item" href="{% url 'cambiar_plan' %}">Cambiar de plan</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Cerrar sesión</a></li>
                </ul>
            </li>
            {% else %}
            <li class="nav-item">
                <a class="btn btn-outline-primary" href="{% url 'login' %}">Iniciar sesión</a>
            </li>
            {% endif %}
        </ul>
    </div>
</nav>

<main class="container mt-4">
    {% block content %}{% endblock %}
</main>

<footer class="text-center mt-4 mb-3 text-muted">
    <small>© 2025 SPBVC</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
