{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-light">
    <div class="container">

        <!-- Logo -->
        <div class="row mt-5">
            <div class="col-12 text-center">
                <span class="logo_login">ST</span>
            </div>
        </div>

        <!-- Título -->
        <div class="row mt-3">
            <div class="col-12 text-center">
                <h2>Restablecer Contraseña</h2>
                <p>Ingrese su correo electrónico y le enviaremos instrucciones para restablecer su contraseña.</p>
            </div>
        </div>

        <!-- Formulario -->
        <form method="post">
            {% csrf_token %}
            <div class="row mt-3">
                <div class="col-12 col-md-6 mx-auto text-center">
                    {{ form.email.label_tag }}
                    {{ form.email }}
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-12 col-md-6 mx-auto text-center">
                    <button type="submit" class="btn btn-primary w-100">Enviar correo</button>
                </div>
            </div>
        </form>

        <!-- Volver -->
        <div class="row mt-4">
            <div class="col-12 text-center">
                <a href="{% url 'login' %}">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
</body>
</html>
