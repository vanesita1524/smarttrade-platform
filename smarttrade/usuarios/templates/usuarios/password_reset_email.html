<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecimiento de contraseña</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        a.button {
            display: inline-block;
            margin-top: 15px;
            background-color: #007bff;
            color: white !important;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
        }
        a.button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Hola,</h2>
        <p>Recibimos una solicitud para restablecer tu contraseña en <strong>SmartTrade BVC</strong>.</p>
        <p>Haz clic en el siguiente botón para establecer una nueva contraseña:</p>
        <p>
            <a class="button" href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}">
                Restablecer contraseña
            </a>
        </p>
        <p>Si no realizaste esta solicitud, puedes ignorar este mensaje.</p>
        <p>Gracias,<br>El equipo de SmartTrade Colombia</p>
    </div>
</body>
</html>
